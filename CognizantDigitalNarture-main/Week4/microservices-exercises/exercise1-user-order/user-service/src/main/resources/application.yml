server:
  port: 8081

spring:
  application:
    name: user-service

  # ---- Use MySQL in real deployments (uncomment) ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  # jpa:
  #   hibernate:
  #     ddl-auto: update
  #   show-sql: true

  # ---- H2 in-memory DB for quick local testing ----
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
