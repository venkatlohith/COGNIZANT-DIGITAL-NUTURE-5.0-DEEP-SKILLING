spring.application.name=load-balancer-gateway
server.port=8080

# Load Balanced Route configuration
# URI uses lb:// scheme which tells Spring Cloud Gateway to use LoadBalancer
# 'example-service' is the registered service name in the service registry
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**
