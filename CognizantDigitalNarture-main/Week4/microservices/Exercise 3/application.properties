spring.application.name=resilience-gateway
server.port=8080

# Actuator: expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit Breaker configuration for 'exampleCircuitBreaker' instance
# registerHealthIndicator: shows circuit breaker status in /actuator/health
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true

# slidingWindowSize: number of calls used to calculate failure rate
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10

# failureRateThreshold: % of failures that triggers the circuit to OPEN
# If 50% or more of the last 10 calls fail, circuit opens and stops forwarding requests
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50
